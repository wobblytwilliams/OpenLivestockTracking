name: Build ZephyrLogger UF2

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/zephyrlogger-uf2.yml"
      - "Firmware/ZephyrLogger/**"
  pull_request:
    paths:
      - ".github/workflows/zephyrlogger-uf2.yml"
      - "Firmware/ZephyrLogger/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ItsyBitsy nRF52840 UF2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          base-path: Firmware
          app-path: ZephyrLogger
          toolchains: arm-zephyr-eabi

      - name: Build ZephyrLogger
        working-directory: Firmware
        run: |
          west build \
            -b adafruit_itsybitsy/nrf52840 \
            ZephyrLogger \
            -d ../build/zephyrlogger \
            --pristine always

      - name: Upload UF2
        uses: actions/upload-artifact@v7
        with:
          name: OpenLivestockGPS-ZephyrLogger-UF2
          path: build/zephyrlogger/zephyr/zephyr.uf2
          if-no-files-found: error

      - name: Prepare Release Files
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p release
          cp build/zephyrlogger/zephyr/zephyr.uf2 release/zephyr.uf2
          (cd release && sha256sum zephyr.uf2 > zephyr.uf2.sha256)

      - name: Publish Latest UF2 Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: zephyrlogger-latest
          RELEASE_TITLE: ZephyrLogger Latest UF2
        run: |
          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes "Automatically built ZephyrLogger UF2 from commit $GITHUB_SHA." \
              --latest
          else
            gh release create "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes "Automatically built ZephyrLogger UF2 from commit $GITHUB_SHA." \
              --latest
          fi

          gh release upload "$TAG_NAME" \
            release/zephyr.uf2 \
            release/zephyr.uf2.sha256 \
            --clobber
