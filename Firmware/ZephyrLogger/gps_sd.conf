# GPS + SD feature-parity test build. ACC and BLE remain enabled from prj.conf.
CONFIG_SERIAL=y
CONFIG_SPI=y
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_NUM_FILES=4
CONFIG_FS_FATFS_NUM_DIRS=1
CONFIG_FS_FATFS_HAS_RTC=n
CONFIG_OLG_STATUS_LED=y

CONFIG_OLG_GPS_ENABLE=y
CONFIG_OLG_GPS_INTERVAL_MS=180000
CONFIG_OLG_GPS_TIMEOUT_MS=15000
CONFIG_OLG_GPS_BACKUP_SLEEP_ENABLE=y
CONFIG_OLG_GPS_TX_IDLE_HIGH=y
CONFIG_OLG_GPS_SLEEP_REFRESH_MS=30000

CONFIG_OLG_SD_ENABLE=y
CONFIG_OLG_SD_STARTUP_CHECK=y
CONFIG_OLG_SD_CLOSE_BETWEEN_FLUSHES=y
CONFIG_OLG_SD_SEND_CMD0_ON_SLEEP=y
CONFIG_OLG_SD_RELEASE_SPI_PINS_ON_SLEEP=y
CONFIG_OLG_SD_SYNC_EACH_LINE=n
CONFIG_OLG_SD_FLUSH_FIRST_MS=180000
CONFIG_OLG_SD_FLUSH_FAILSAFE_MS=900000
